<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proctorly | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-page="admin">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-icon">FG</div>
          <div>
            <p class="brand-name">Proctorly</p>
            <p class="brand-subtitle">AI Proctoring</p>
          </div>
        </div>
        <nav class="sidebar-nav">
          <a class="nav-link is-active" href="/admin.html">Results</a>
          <button class="nav-link nav-button" id="logoutButton" type="button">Logout</button>
        </nav>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Admin Dashboard</p>
            <h1>Recent Student Attempts</h1>
            <p>Real-time monitoring summary and final review status.</p>
          </div>
          <div class="profile-chip">
            <span>Chief Proctor</span>
          </div>
        </header>

        <section class="stats-grid" id="adminStats"></section>

        <section class="admin-grid">
          <div class="card table-card">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Attempts Table</p>
                <h2>Student Results</h2>
              </div>
            </div>

            <div class="table-wrap">
              <table class="results-table">
                <thead>
                  <tr>
                    <th>Student</th>
                    <th>Exam</th>
                    <th>Marks</th>
                    <th>Warnings</th>
                    <th>Decision</th>
                    <th>Submitted</th>
                  </tr>
                </thead>
                <tbody id="adminResultsBody"></tbody>
              </table>
            </div>
          </div>

          <aside class="review-panel">
            <div class="card">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">Review Panel</p>
                  <h3>Integrity Summary</h3>
                </div>
              </div>
              <div id="adminReviewCard" class="stack-sm"></div>
            </div>
          </aside>
        </section>
      </main>
    </div>

    <script src="/js/app.js"></script>
  </body>
</html>
